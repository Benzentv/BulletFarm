<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BulletFarm</title>

  <!-- favicon 404 vermeiden -->
  <link rel="icon" href="data:," />

  <!-- Supabase lokal im Repo-Root -->
  <script defer src="./supabase.min.js"></script>

  <style>
    :root{
      --bg:#0b0f14;
      --card:#111826;
      --border: rgba(255,255,255,.12);
      --text:#e9eef6;
      --muted:#9aa6b2;
      --primary:#7dd3fc;
      --success:#34d399;
      --danger:#fb7185;
      --radius: 16px;
    }
    *{box-sizing:border-box}
    body{
      margin:0; font-family:system-ui,Segoe UI,Roboto,Arial;
      background:var(--bg); color:var(--text);
      min-height:100vh;
    }
    header{
      position:sticky; top:0; z-index:10;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      padding:14px 16px;
      border-bottom:1px solid var(--border);
      background: rgba(11,15,20,.82);
      backdrop-filter: blur(10px);
    }
    .brand{font-weight:900}
    .tabs{display:flex; gap:8px; flex-wrap:wrap}
    .pill{
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding:9px 12px;
      border-radius:999px;
      cursor:pointer;
      user-select:none;
    }
    .pill.active{border-color: rgba(125,211,252,.6); box-shadow: 0 0 0 3px rgba(125,211,252,.10) inset}
    main{max-width:1100px; margin:0 auto; padding:16px}
    .banner{
      display:none;
      border:1px solid var(--border);
      background: rgba(255,255,255,.03);
      border-radius: 14px;
      padding:10px 12px;
      margin-bottom:12px;
      color:var(--muted);
    }
    .grid{display:grid; grid-template-columns:1.3fr .7fr; gap:12px}
    @media (max-width: 980px){ .grid{grid-template-columns:1fr} header{position:static} }
    .card{
      border:1px solid var(--border);
      background: var(--card);
      border-radius: var(--radius);
      overflow:hidden;
    }
    .head{
      padding:12px 14px;
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;
    }
    .body{padding:14px}
    input, select, button{
      border:1px solid var(--border);
      background: rgba(255,255,255,.04);
      color: var(--text);
      padding:9px 12px;
      border-radius: 12px;
      font: inherit;
      outline:none;
    }
    button{cursor:pointer; font-weight:800}
    button.primary{border-color: rgba(125,211,252,.55); background: rgba(125,211,252,.10)}
    button.success{border-color: rgba(52,211,153,.55); background: rgba(52,211,153,.10)}
    button.danger{border-color: rgba(251,113,133,.55); background: rgba(251,113,133,.10)}
    .muted{color:var(--muted)}
    .products{display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:10px}
    @media (max-width: 720px){ .products{grid-template-columns:1fr} }
    .prod{
      border:1px solid var(--border);
      background: rgba(255,255,255,.03);
      border-radius:14px;
      padding:12px;
    }
    table{width:100%; border-collapse:collapse; font-size:13px}
    th,td{border-bottom:1px solid var(--border); padding:10px 8px; vertical-align:top}
    th{color:var(--muted); text-align:left}
    .count{display:inline-block; min-width:22px; text-align:center; padding:2px 7px; border-radius:999px; border:1px solid var(--border); color:var(--muted)}
    .chips{display:flex; gap:6px; flex-wrap:wrap; margin-top:8px}
.chip{
  display:inline-flex; align-items:center; gap:6px;
  font-size:12px;
  border:1px solid var(--border);
  background: rgba(255,255,255,.03);
  padding:6px 10px;
  border-radius:999px;
}
.dot{width:10px; height:10px; border-radius:999px; display:inline-block}
.previewBox{
  width:100%;
  aspect-ratio:16/9;
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  background: rgba(255,255,255,.03);
}
.previewBox img{width:100%; height:100%; object-fit:cover; display:block}

    /* modal */
    .modalBg{
      position:fixed; inset:0;
      background: rgba(0,0,0,.55);
      display:none;
      align-items:center; justify-content:center;
      padding:16px;
      z-index:100;
    }
    .modal{
      width:min(900px,100%);
      max-height:90vh;
      overflow:auto;
      background: #0b0f14;
      border:1px solid var(--border);
      border-radius: 18px;
    }
    .modalHead{
      padding:12px 14px;
      border-bottom:1px solid var(--border);
      display:flex; justify-content:space-between; align-items:center;
    }
    .modalBody{padding:14px}
  </style>
</head>
<body>

<header>
  <div class="brand" id="brandTitle">BulletFarm</div>
  <div class="tabs">
    <div class="pill active" id="tabShop">Shop</div>
    <div class="pill" id="tabCart">Warenkorb <span class="count" id="cartCount">0</span></div>
    <div class="pill" id="tabAdmin">⚙️ Admin</div>
  </div>
</header>

<main>
  <div class="banner" id="banner"></div>

  <div class="grid">
    <!-- SHOP -->
    <section class="card" id="shopCard">
      <div class="head">
        <b>Produkte</b>
        <div style="display:flex; gap:8px; flex-wrap:wrap">
          <select id="catFilter"></select>
          <input id="searchBox" placeholder="Suchen…" />
          <button id="btnReload" class="primary">Neu laden</button>
        </div>
      </div>
      <div class="body">
        <div class="products" id="productList"></div>
      </div>
    </section>

    <!-- CART -->
    <aside class="card" id="cartCard" style="display:none">
      <div class="head">
        <b>Warenkorb</b>
        <div style="display:flex; gap:8px">
          <button id="btnClearCart" class="danger">Leeren</button>
        </div>
      </div>
      <div class="body">
        <div class="muted" style="margin-bottom:8px">Produkte & Anzahl</div>
        <div style="overflow:auto">
          <table>
            <thead><tr><th>Produkt</th><th>Menge</th><th>Aktion</th></tr></thead>
            <tbody id="cartRows"></tbody>
          </table>
        </div>
        <div style="height:10px"></div>
        <input id="custName" placeholder="Name (optional)" />
        <div style="height:8px"></div>
        <input id="custPhone" placeholder="Telefon (optional)" />
        <div style="height:10px"></div>
        <button id="btnCheckout" class="success" style="width:100%">✅ Bestellung absenden</button>
        <div class="muted" style="margin-top:10px; font-size:12px">
          Bestellungen werden in Supabase gespeichert.
        </div>
      </div>
    </aside>

    <!-- ADMIN -->
    <section class="card" id="adminCard" style="display:none">
      <div class="head">
        <b>Admin</b>
        <button id="btnOpenAdmin" class="primary">Öffnen</button>
      </div>
      <div class="body">
        <div class="muted">Hier kannst du dich als Admin einloggen und später Produkte verwalten.</div>
      </div>
    </section>
  </div>
</main>

<!-- ADMIN MODAL -->
<div class="modalBg" id="modalBg">
  <div class="modal">
    <div class="modalHead">
      <div><b>⚙️ Admin Panel</b></div>
      <button id="btnCloseAdmin">✖</button>
    </div>
    <div class="modalBody">
      <div style="display:flex; gap:8px; flex-wrap:wrap">
        <input id="adminEmail" type="email" placeholder="Admin Email" style="flex:1; min-width:220px" />
        <input id="adminPass" type="password" placeholder="Passwort" style="flex:1; min-width:180px" />
        <button id="btnLogin" class="primary">Einloggen</button>
        <button id="btnLogout" style="display:none">Logout</button>
      </div>
      <div class="muted" id="loginMsg" style="margin-top:10px"></div>

      <div style="height:14px"></div>

<!-- Admin Tabs -->
<div id="adminTabs" style="display:none; gap:8px; flex-wrap:wrap; margin-top:6px"></div>

<div style="height:12px"></div>

<!-- Panels -->
<div id="adminPanels" style="display:none">
  <div id="panelProducts"></div>
  <div id="panelCategories" style="display:none"></div>
  <div id="panelTheme" style="display:none"></div>
  <div id="panelOrders" style="display:none"></div>
  <div id="panelNotify" style="display:none"></div>
</div>

<div class="muted" id="adminNote" style="margin-top:12px; font-size:12px"></div>

  </div>
</div>

<script>

const banner = document.getElementById("banner");
function showBanner(msg){
  banner.style.display = "block";
  banner.textContent = msg;
}

/* ========= Supabase Daten ========= */
const SUPABASE_URL = "https://hmfyjgmgkqjcspjyqihm.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhtZnlqZ21na3FqY3NwanlxaWhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc4ODc5MTYsImV4cCI6MjA4MzQ2MzkxNn0.j873-VozJFlYk1zBRvbirbH9eFW_wP_gtbFn0zTVqTo";

let sb = null;

/* ========= State ========= */
let categories = [];
let products = [];
let cart = JSON.parse(localStorage.getItem("bf_cart") || "[]");

function saveCart(){
  localStorage.setItem("bf_cart", JSON.stringify(cart));
  document.getElementById("cartCount").textContent = String(cart.reduce((s,x)=>s + x.qty, 0));
}

/* ========= Tabs (stabil, ohne Abhängigkeiten) ========= */
function setTab(t){
  document.getElementById("tabShop").classList.toggle("active", t==="shop");
  document.getElementById("tabCart").classList.toggle("active", t==="cart");
  document.getElementById("tabAdmin").classList.toggle("active", t==="admin");

  document.getElementById("shopCard").style.display = (t==="shop") ? "" : "none";
  document.getElementById("cartCard").style.display = (t==="cart") ? "" : "none";
  document.getElementById("adminCard").style.display = (t==="admin") ? "" : "none";
}

document.getElementById("tabShop").onclick = ()=>setTab("shop");
document.getElementById("tabCart").onclick = ()=>setTab("cart");
document.getElementById("tabAdmin").onclick = ()=>setTab("admin");

/* ========= Admin Modal ========= */
function openAdmin(){ document.getElementById("modalBg").style.display = "flex"; }
function closeAdmin(){ document.getElementById("modalBg").style.display = "none"; }

document.getElementById("btnOpenAdmin").onclick = openAdmin;
document.getElementById("btnCloseAdmin").onclick = closeAdmin;
document.getElementById("modalBg").onclick = (e)=>{ if(e.target.id==="modalBg") closeAdmin(); };

/* ========= Render ========= */
function renderFilter(){
  const sel = document.getElementById("catFilter");
  const prev = sel.value || "all";
  sel.innerHTML = "";
  sel.appendChild(new Option("Alle Kategorien", "all"));
  sel.appendChild(new Option("Keine Kategorie", "none"));
  for(const c of categories) sel.appendChild(new Option(c.name, c.id));
  sel.value = prev;
  sel.onchange = renderProducts;
  document.getElementById("searchBox").oninput = renderProducts;
}

function renderProducts(){
  const list = document.getElementById("productList");
  list.innerHTML = "";

  const filter = document.getElementById("catFilter").value;
  const q = (document.getElementById("searchBox").value || "").trim().toLowerCase();

  let shown = products.slice();
  if(filter==="none") shown = shown.filter(p=>!p.category_id);
  else if(filter!=="all") shown = shown.filter(p=>p.category_id===filter);
  if(q) shown = shown.filter(p=>String(p.name||"").toLowerCase().includes(q));

  if(shown.length===0){
    list.innerHTML = `<div class="muted">Keine Produkte gefunden.</div>`;
    return;
  }

  for(const p of shown){
    const div = document.createElement("div");
    div.className = "prod";
    const img = (p.image_url && String(p.image_url).trim()) ? String(p.image_url).trim() : "";
div.innerHTML = `
  ${img ? `
    <div style="width:100%; aspect-ratio: 16/9; overflow:hidden; border-radius:12px; border:1px solid var(--border); margin-bottom:10px; background: rgba(255,255,255,.03)">
      <img src="${img}" alt="" style="width:100%; height:100%; object-fit:cover; display:block"
           onerror="this.closest('div').style.display='none'">
    </div>
  ` : ``}
  <b>${p.name}</b>
  <div class="muted" style="font-size:12px; margin-top:4px">${p.category_id || "—"}</div>
  <div style="height:8px"></div>
  <button class="primary" data-add="${p.id}">In den Warenkorb</button>
`;

    list.appendChild(div);
  }
  list.querySelectorAll("[data-add]").forEach(b=>{
    b.onclick = ()=>addToCart(b.getAttribute("data-add"));
  });
}

function addToCart(productId){
  const it = cart.find(x=>x.productId===productId);
  if(it) it.qty += 1;
  else cart.push({ productId, qty: 1 });
  saveCart();
  renderCart();
}

function renderCart(){
  saveCart();
  const tb = document.getElementById("cartRows");
  tb.innerHTML = "";
  if(cart.length===0){
    tb.innerHTML = `<tr><td colspan="3" class="muted">Warenkorb ist leer.</td></tr>`;
    return;
  }
  for(const item of cart){
    const p = products.find(x=>x.id===item.productId);
    const name = p ? p.name : "(Produkt fehlt)";
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><b>${name}</b></td>
      <td>${item.qty}</td>
      <td>
        <button data-inc="${item.productId}">+</button>
        <button data-dec="${item.productId}">-</button>
        <button class="danger" data-rem="${item.productId}">X</button>
      </td>
    `;
    tb.appendChild(tr);
  }
  tb.querySelectorAll("[data-inc]").forEach(b=>b.onclick=()=>{
    const id = b.getAttribute("data-inc");
    const it = cart.find(x=>x.productId===id);
    if(it){ it.qty++; saveCart(); renderCart(); }
  });
  tb.querySelectorAll("[data-dec]").forEach(b=>b.onclick=()=>{
    const id = b.getAttribute("data-dec");
    const it = cart.find(x=>x.productId===id);
    if(it){ it.qty=Math.max(0,it.qty-1); if(it.qty===0) cart=cart.filter(x=>x.productId!==id); saveCart(); renderCart(); }
  });
  tb.querySelectorAll("[data-rem]").forEach(b=>b.onclick=()=>{
    const id = b.getAttribute("data-rem");
    cart = cart.filter(x=>x.productId!==id);
    saveCart(); renderCart();
  });
}

document.getElementById("btnClearCart").onclick = ()=>{
  cart = [];
  saveCart();
  renderCart();
};

/* ========= Supabase load ========= */
async function loadPublic(){
  if(!sb){
    showBanner("JS läuft ✅ — Supabase wird initialisiert…");
    return;
  }
  showBanner("Supabase verbunden ✅ — lade Daten…");

  // Settings (optional)
  try{
    const s = await sb.from("shop_settings").select("data").eq("id",1).maybeSingle();
    const title = s.data?.data?.title;
    if(title) document.getElementById("brandTitle").textContent = title;
  }catch{}

  const c = await sb.from("categories").select("*").order("created_at", {ascending:true});
  categories = c.data || [];

  const p = await sb.from("products").select("*").order("created_at", {ascending:false});
  products = p.data || [];

  renderFilter();
  renderProducts();
  renderCart();
  showBanner("Shop geladen ✅ (wenn leer: Tabellen/RLS prüfen)");
}

document.getElementById("btnReload").onclick = loadPublic;

/* ========= Checkout ========= */
document.getElementById("btnCheckout").onclick = async ()=>{
  if(cart.length===0){ alert("Warenkorb ist leer"); return; }
  if(!sb){ alert("Supabase nicht bereit"); return; }

  const name = (document.getElementById("custName").value || "").trim();
  const phone = (document.getElementById("custPhone").value || "").trim();

  const items = cart.map(ci=>{
    const p = products.find(x=>x.id===ci.productId);
    return { productId: ci.productId, name: p?.name || "Unbekannt", qty: ci.qty };
  });

  const ins = await sb.from("orders").insert({ status:"offen", customer:{name,phone}, items });
  if(ins.error){
    console.error(ins.error);
    alert("Bestellung fehlgeschlagen (RLS insert?)");
    return;
  }
  cart = [];
  saveCart();
  renderCart();
  alert("✅ Bestellung gespeichert!");
  setTab("shop");
};

/* ========= Admin (Login + Panels) ========= */
const adminTabsEl = document.getElementById("adminTabs");
const adminPanelsEl = document.getElementById("adminPanels");
const adminNoteEl = document.getElementById("adminNote");

const ADMIN_SECTIONS = [
  { id:"products", label:"Produkte" },
  { id:"categories", label:"Kategorien" },
  { id:"theme", label:"Theme" },
  { id:"orders", label:"Bestellungen" },
  { id:"notify", label:"Notify" },
];
let adminActive = "products";

function showPanel(id){
  ["panelProducts","panelCategories","panelTheme","panelOrders","panelNotify"].forEach(pid=>{
    document.getElementById(pid).style.display = (pid === "panel"+id[0].toUpperCase()+id.slice(1)) ? "" : "none";
  });

  if(id==="products") renderAdminProducts();
  if(id==="categories") renderAdminCategories();
  if(id==="theme") renderAdminTheme();
  if(id==="orders") renderAdminOrders();
  if(id==="notify") renderAdminNotify();
}

function renderAdminTabs(){
  adminTabsEl.innerHTML = "";
  adminTabsEl.style.display = "flex";
  ADMIN_SECTIONS.forEach(s=>{
    const b = document.createElement("button");
    b.textContent = s.label;
    b.className = "primary";
    b.style.opacity = (adminActive===s.id) ? "1" : ".65";
    b.onclick = ()=>{ adminActive = s.id; renderAdminTabs(); showPanel(s.id); };
    adminTabsEl.appendChild(b);
  });
  adminPanelsEl.style.display = "";
}

async function refreshAuthUI(){
  const sess = await sb.auth.getSession();
  const loggedIn = !!sess.data?.session;

  document.getElementById("btnLogout").style.display = loggedIn ? "" : "none";
  document.getElementById("loginMsg").textContent = loggedIn
    ? `Eingeloggt ✅ (${sess.data.session.user.email})`
    : "Bitte einloggen.";

  adminTabsEl.style.display = loggedIn ? "flex" : "none";
  adminPanelsEl.style.display = loggedIn ? "" : "none";
  adminNoteEl.textContent = loggedIn
    ? "Admin aktiv: Produkte/Kategorien/Theme/Orders/Notify"
    : "Nur eingeloggte Admins können bearbeiten (RLS).";

  if(loggedIn){
    renderAdminTabs();
    showPanel(adminActive);
  }
}

document.getElementById("btnLogin").onclick = async ()=>{
  if(!sb){ alert("Supabase nicht bereit"); return; }
  const email = (document.getElementById("adminEmail").value || "").trim();
  const password = (document.getElementById("adminPass").value || "");
  const r = await sb.auth.signInWithPassword({ email, password });
  if(r.error){
    console.error(r.error);
    document.getElementById("loginMsg").textContent = "Login fehlgeschlagen";
    return;
  }
  await refreshAuthUI();
};

document.getElementById("btnLogout").onclick = async ()=>{
  if(!sb) return;
  await sb.auth.signOut();
  await refreshAuthUI();
};

/* ========= Admin: Kategorien (CRUD) ========= */
function renderAdminCategories(){
  const el = document.getElementById("panelCategories");
  el.innerHTML = `
    <div class="card" style="margin-top:10px">
      <div class="head"><b>Kategorien</b></div>
      <div class="body">
        <div style="display:flex; gap:8px; flex-wrap:wrap">
          <input id="newCatName" placeholder="Neue Kategorie" />
          <button class="primary" id="btnAddCat">Hinzufügen</button>
          <button id="btnReloadCats">Neu laden</button>
        </div>
        <div style="height:12px"></div>
        <div style="overflow:auto">
          <table>
            <thead><tr><th>Name</th><th>ID</th><th>Aktion</th></tr></thead>
            <tbody id="catTable"></tbody>
          </table>
        </div>
      </div>
    </div>
  `;

  document.getElementById("btnReloadCats").onclick = async ()=>{ await loadPublic(); };
  document.getElementById("btnAddCat").onclick = async ()=>{
    const name = (document.getElementById("newCatName").value||"").trim();
    if(!name) return;
    const r = await sb.from("categories").insert({ name });
    if(r.error){ console.error(r.error); alert("Kategorie hinzufügen fehlgeschlagen (RLS?)"); return; }
    document.getElementById("newCatName").value="";
    await loadPublic();
    renderAdminCategories();
  };

  const tb = document.getElementById("catTable");
  tb.innerHTML = categories.length ? "" : `<tr><td colspan="3" class="muted">Keine Kategorien</td></tr>`;

  categories.forEach(c=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><input data-name="${c.id}" value="${c.name.replaceAll('"','&quot;')}" /></td>
      <td class="muted">${String(c.id).slice(0,8)}</td>
      <td>
        <button class="success" data-save="${c.id}">Speichern</button>
        <button class="danger" data-del="${c.id}">Löschen</button>
      </td>
    `;
    tb.appendChild(tr);
  });

  tb.querySelectorAll("[data-save]").forEach(b=>b.onclick=async ()=>{
    const id = b.getAttribute("data-save");
    const name = (tb.querySelector(`[data-name="${id}"]`).value||"").trim() || "Unbenannt";
    const r = await sb.from("categories").update({ name }).eq("id", id);
    if(r.error){ console.error(r.error); alert("Update fehlgeschlagen (RLS?)"); return; }
    await loadPublic(); renderAdminCategories();
  });

  tb.querySelectorAll("[data-del]").forEach(b=>b.onclick=async ()=>{
    const id = b.getAttribute("data-del");
    const r = await sb.from("categories").delete().eq("id", id);
    if(r.error){ console.error(r.error); alert("Löschen fehlgeschlagen (RLS?)"); return; }
    await loadPublic(); renderAdminCategories();
  });
}

/* ========= Admin: Produkte (CRUD) + Bearbeiten + Ressourcen + Bild-Vorschau ========= */
let editProductId = null;

function fmtRes(res){
  return (res||[]).map(r=>`<span class="chip"><span class="dot" style="background:${r.color||'#fff'}"></span>${escapeHtml(r.name)}: <b>${Number(r.amount)||0}</b></span>`).join("");
}
function escapeHtml(s){
  return String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

function renderAdminProducts(){
  const el = document.getElementById("panelProducts");

  const catOptions = [
    `<option value="none">Keine Kategorie</option>`,
    ...categories.map(c=>`<option value="${c.id}">${escapeHtml(c.name)}</option>`)
  ].join("");

  el.innerHTML = `
    <div class="card" style="margin-top:10px">
      <div class="head" style="justify-content:space-between">
        <b>${editProductId ? "Produkt bearbeiten" : "Neues Produkt"}</b>
        <div style="display:flex; gap:8px">
          <button id="btnNewProd" class="primary">${editProductId ? "Neues Produkt" : "Reset"}</button>
          <button id="btnReloadProds">Neu laden</button>
        </div>
      </div>
      <div class="body">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px">
          <input id="pName" placeholder="Produktname" />
          <select id="pCat">${catOptions}</select>
          <input id="pImg" placeholder="Bild URL (optional)" style="grid-column: 1 / -1" />
        </div>

        <div style="height:10px"></div>

        <div class="previewBox" id="imgPreviewWrap" style="display:none">
          <img id="imgPreview" alt="">
        </div>

        <div style="height:12px"></div>

        <div style="border:1px solid var(--border); border-radius:14px; padding:12px; background: rgba(255,255,255,.02)">
          <b>Ressourcen</b>
          <div class="muted" style="font-size:12px; margin-top:4px">name / amount / color</div>

          <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:10px">
            <input id="rName" placeholder="Name" style="flex:1; min-width:160px" />
            <input id="rAmt" type="number" placeholder="Anzahl" style="width:120px" />
            <input id="rColor" type="color" value="#7dd3fc" style="width:70px; padding:6px" />
            <button id="btnAddRes">Hinzufügen</button>
          </div>

          <div style="height:10px"></div>
          <div id="resList" class="chips"></div>
        </div>

        <div style="height:12px"></div>
        <div style="display:flex; gap:8px; flex-wrap:wrap">
          <button class="success" id="btnSaveProd">${editProductId ? "✅ Speichern" : "✅ Hinzufügen"}</button>
          <button class="danger" id="btnDeleteProd" style="display:${editProductId ? "" : "none"}">🗑 Löschen</button>
        </div>
      </div>
    </div>

    <div class="card" style="margin-top:12px">
      <div class="head"><b>Produkte</b></div>
      <div class="body" style="overflow:auto">
        <table>
          <thead><tr><th>Bild</th><th>Name</th><th>Kategorie</th><th>Ressourcen</th><th>Aktion</th></tr></thead>
          <tbody id="prodTable"></tbody>
        </table>
      </div>
    </div>
  `;

  // State für Editor (im DOM halten)
  const editorState = getEditorState();
  setupEditor(editorState);
  fillEditorFromProduct(editorState, editProductId);

  document.getElementById("btnNewProd").onclick = ()=>{
    editProductId = null;
    renderAdminProducts();
  };
  document.getElementById("btnReloadProds").onclick = async ()=>{
    await loadPublic();
    renderAdminProducts();
  };

  renderProductsTable();
}

function getEditorState(){
  return {
    resources: [],
    setResources(newRes){
      this.resources = newRes;
      renderResChips(this);
    }
  };
}

function setupEditor(st){
  // Bild Vorschau live
  const imgInput = document.getElementById("pImg");
  imgInput.addEventListener("input", ()=>updateImagePreview(imgInput.value));

  // Ressourcen hinzufügen
  document.getElementById("btnAddRes").onclick = ()=>{
    const name = (document.getElementById("rName").value||"").trim();
    const amount = Number(document.getElementById("rAmt").value);
    const color = document.getElementById("rColor").value;

    if(!name || !Number.isFinite(amount) || amount<=0){
      alert("Bitte Ressource + positive Anzahl eingeben.");
      return;
    }
    st.setResources([...(st.resources||[]), { name, amount, color }]);
    document.getElementById("rName").value="";
    document.getElementById("rAmt").value="";
  };

  // Speichern/Hinzufügen
  document.getElementById("btnSaveProd").onclick = async ()=>{
    const name = (document.getElementById("pName").value||"").trim();
    const cat = document.getElementById("pCat").value;
    const image_url = (document.getElementById("pImg").value||"").trim() || null;

    if(!name){ alert("Produktname fehlt."); return; }

    const payload = {
      name,
      category_id: (cat==="none") ? null : cat,
      image_url,
      resources: st.resources || []
    };

    let r;
    if(editProductId){
      r = await sb.from("products").update(payload).eq("id", editProductId);
    }else{
      r = await sb.from("products").insert(payload);
    }

    if(r.error){ console.error(r.error); alert("Speichern fehlgeschlagen (RLS?)"); return; }

    await loadPublic();
    editProductId = null;
    renderAdminProducts();
    alert("✅ Produkt gespeichert.");
  };

  // Löschen
  document.getElementById("btnDeleteProd").onclick = async ()=>{
    if(!editProductId) return;
    const ok = confirm("Produkt wirklich löschen?");
    if(!ok) return;
    const r = await sb.from("products").delete().eq("id", editProductId);
    if(r.error){ console.error(r.error); alert("Löschen fehlgeschlagen (RLS?)"); return; }
    await loadPublic();
    editProductId = null;
    renderAdminProducts();
  };

  // initial chips
  renderResChips(st);
}

function fillEditorFromProduct(st, productId){
  const nameEl = document.getElementById("pName");
  const catEl = document.getElementById("pCat");
  const imgEl = document.getElementById("pImg");

  if(!productId){
    nameEl.value = "";
    catEl.value = "none";
    imgEl.value = "";
    updateImagePreview("");
    st.setResources([]);
    return;
  }

  const p = products.find(x=>x.id===productId);
  if(!p) return;

  nameEl.value = p.name || "";
  catEl.value = p.category_id ? p.category_id : "none";
  imgEl.value = p.image_url || "";
  updateImagePreview(p.image_url || "");
  st.setResources(Array.isArray(p.resources) ? p.resources : []);
}

function updateImagePreview(url){
  const wrap = document.getElementById("imgPreviewWrap");
  const img = document.getElementById("imgPreview");
  const u = (url||"").trim();
  if(!u){
    wrap.style.display = "none";
    img.removeAttribute("src");
    return;
  }
  wrap.style.display = "";
  img.src = u;
  img.onerror = ()=>{ wrap.style.display="none"; };
}

function renderResChips(st){
  const box = document.getElementById("resList");
  if(!box) return;
  const res = st.resources || [];
  if(res.length===0){
    box.innerHTML = `<span class="muted">Noch keine Ressourcen</span>`;
    return;
  }
  box.innerHTML = res.map((r,idx)=>
    `<span class="chip">
      <span class="dot" style="background:${r.color||'#fff'}"></span>
      ${escapeHtml(r.name)}: <b>${Number(r.amount)||0}</b>
      <button data-rdel="${idx}" class="danger" style="padding:2px 8px; border-radius:999px; margin-left:6px">x</button>
    </span>`
  ).join("");

  box.querySelectorAll("[data-rdel]").forEach(b=>b.onclick=()=>{
    const idx = Number(b.getAttribute("data-rdel"));
    const next = (st.resources||[]).slice();
    next.splice(idx,1);
    st.setResources(next);
  });
}

function renderProductsTable(){
  const tb = document.getElementById("prodTable");
  tb.innerHTML = products.length ? "" : `<tr><td colspan="5" class="muted">Keine Produkte</td></tr>`;

  products.forEach(p=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${p.image_url ? `<img src="${p.image_url}" alt="" style="width:70px;height:44px;object-fit:cover;border-radius:10px;border:1px solid var(--border)"
            onerror="this.style.display='none'">` : `<span class="muted">—</span>`}</td>
      <td><b>${escapeHtml(p.name)}</b><div class="muted" style="font-size:12px">${String(p.id).slice(0,8)}</div></td>
      <td class="muted">${p.category_id ? String(p.category_id).slice(0,8) : "—"}</td>
      <td>${fmtRes(p.resources)}</td>
      <td>
        <button class="primary" data-edit="${p.id}">Bearbeiten</button>
      </td>
    `;
    tb.appendChild(tr);
  });

  tb.querySelectorAll("[data-edit]").forEach(b=>b.onclick=()=>{
    editProductId = b.getAttribute("data-edit");
    renderAdminProducts();
  });
}

/* ========= Admin: Theme (shop_settings id=1) ========= */
function renderAdminTheme(){
  const el = document.getElementById("panelTheme");
  el.innerHTML = `
    <div class="card" style="margin-top:10px">
      <div class="head"><b>Theme</b></div>
      <div class="body">
        <div class="muted" style="font-size:12px">Speichert in shop_settings (id=1) als JSON.</div>
        <div style="height:10px"></div>
        <input id="stTitle" placeholder="Shop Titel" />
        <div style="height:8px"></div>
        <input id="stBg" placeholder="Background Farbe z.B. #0b0f14" />
        <div style="height:10px"></div>
        <button class="primary" id="btnSaveTheme">Speichern</button>
      </div>
    </div>
  `;
  // optional: wenn settings existiert, füllen
  document.getElementById("stTitle").value = document.getElementById("brandTitle").textContent || "";
  document.getElementById("stBg").value = getComputedStyle(document.documentElement).getPropertyValue("--bg").trim() || "";

  document.getElementById("btnSaveTheme").onclick = async ()=>{
    const title = (document.getElementById("stTitle").value||"").trim();
    const bg = (document.getElementById("stBg").value||"").trim();
    const data = { title, colors: { bg } };
    const r = await sb.from("shop_settings").update({ data }).eq("id", 1);
    if(r.error){ console.error(r.error); alert("Theme speichern fehlgeschlagen (RLS?)"); return; }
    alert("Theme gespeichert. Neu laden klicken.");
  };
}

/* ========= Admin: Orders (list + Status ändern) ========= */
let ordersCache = [];

function renderAdminOrders(){
  const el = document.getElementById("panelOrders");
  el.innerHTML = `
    <div class="card" style="margin-top:10px">
      <div class="head" style="justify-content:space-between">
        <b>Bestellungen</b>
        <button id="btnLoadOrders">Laden</button>
      </div>
      <div class="body" style="overflow:auto">
        <table>
          <thead><tr><th>Zeit</th><th>ID</th><th>Status</th><th>Aktion</th></tr></thead>
          <tbody id="ordersTable"></tbody>
        </table>
      </div>
    </div>
  `;
  document.getElementById("btnLoadOrders").onclick = loadOrders;
}

async function loadOrders(){
  const tb = document.getElementById("ordersTable");
  tb.innerHTML = `<tr><td colspan="4" class="muted">Lade…</td></tr>`;

  const r = await sb.from("orders").select("*").order("created_at", {ascending:false});
  if(r.error){
    console.error(r.error);
    tb.innerHTML = `<tr><td colspan="4" class="muted">Fehler (RLS?)</td></tr>`;
    return;
  }

  ordersCache = r.data || [];
  tb.innerHTML = ordersCache.length ? "" : `<tr><td colspan="4" class="muted">Keine Bestellungen</td></tr>`;

  ordersCache.forEach(o=>{
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${new Date(o.created_at).toLocaleString("de-DE")}</td>
      <td class="muted">${String(o.id).slice(0,8)}</td>
      <td><b>${o.status || "offen"}</b></td>
      <td style="display:flex; gap:6px; flex-wrap:wrap">
        <button class="success" data-st="bearbeitet" data-id="${o.id}">bearbeitet</button>
        <button data-st="offen" data-id="${o.id}">offen</button>
        <button class="danger" data-st="storniert" data-id="${o.id}">storniert</button>
      </td>
    `;
    tb.appendChild(tr);
  });

  tb.querySelectorAll("[data-st]").forEach(b=>b.onclick=async ()=>{
    const id = b.getAttribute("data-id");
    const status = b.getAttribute("data-st");
    const u = await sb.from("orders").update({ status }).eq("id", id);
    if(u.error){ console.error(u.error); alert("Status speichern fehlgeschlagen (RLS?)"); return; }
    await loadOrders();
  });
}


/* ========= Admin: Notify (Edge Function URL speichern) ========= */
function renderAdminNotify(){
  const el = document.getElementById("panelNotify");
  el.innerHTML = `
    <div class="card" style="margin-top:10px">
      <div class="head"><b>Notify</b></div>
      <div class="body">
        <div class="muted" style="font-size:12px">
          Trage hier nur die Edge Function URL ein (keine Webhooks im Frontend!).
        </div>
        <div style="height:10px"></div>
        <input id="nfUrl" placeholder="https://...supabase.co/functions/v1/notify-order" />
        <div style="height:10px"></div>
        <button class="primary" id="nfSave">Speichern</button>
      </div>
    </div>
  `;
  document.getElementById("nfSave").onclick = async ()=>{
    const edgeUrl = (document.getElementById("nfUrl").value||"").trim();
    const data = { notify: { enabled: !!edgeUrl, edgeFunctionUrl: edgeUrl } };
    const r = await sb.from("shop_settings").update({ data }).eq("id", 1);
    if(r.error){ console.error(r.error); alert("Notify speichern fehlgeschlagen (RLS?)"); return; }
    alert("Notify gespeichert.");
  };
}
